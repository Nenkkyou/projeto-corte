<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projeto Corte • Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Teko:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-layout">
      <aside class="sidebar" aria-label="Navegação principal">
        <div class="brand" id="brand"></div>
        <div class="sidebar-actions" id="sidebar-actions"></div>
        <nav class="menu" id="menu"></nav>
      </aside>

      <main class="content">
        <header class="topbar" id="topbar"></header>
        <section class="metrics" id="metrics" aria-label="Indicadores"></section>
        <section class="panel-grid">
          <article class="card" id="finance"></article>
          <article class="card" id="deadlines"></article>
        </section>
        <article class="card featured" id="featured-project"></article>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
